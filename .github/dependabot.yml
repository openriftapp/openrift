version: 2
# "npm" + enable-beta-ecosystems is a workaround so Dependabot updates bun.lock.
# "bun" ecosystem is GA but has a known bug where it skips the lockfile:
# https://github.com/dependabot/dependabot-core/issues/11602
enable-beta-ecosystems: true
updates:
  - package-ecosystem: "bun"
    directory: "/"
    schedule:
      interval: "weekly"
    versioning-strategy: "increase"
    groups:
      production:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      dev:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
