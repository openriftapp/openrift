# Dev:  docker compose up db       (just Postgres; run API + Vite natively with bun dev)
# Prod: docker compose up -d       (Postgres + app + web)
services:
  # PostgreSQL database.
  db:
    image: postgres:18-alpine
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "127.0.0.1:${DB_PORT:-5432}:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "10"
    restart: unless-stopped

  # Hono API server (runs migrations on startup, schedules cron jobs).
  api:
    image: ghcr.io/eikowagenknecht/openrift-api:${IMAGE_TAG:-latest}
    user: "${UID:-1000}:${GID:-1000}"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./card-images:/app/card-images
    ports:
      - "127.0.0.1:${API_PORT:-3001}:3000"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "10"
    restart: unless-stopped

  # Nginx: serves the SPA and proxies /api to the api container.
  web:
    image: ghcr.io/eikowagenknecht/openrift-web:${IMAGE_TAG:-latest}
    depends_on:
      - api
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
    volumes:
      - ./card-images:/usr/share/nginx/html/card-images:ro
    ports:
      - "127.0.0.1:${WEB_PORT:-8080}:8080"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "10"
    restart: unless-stopped

  # Scheduled PostgreSQL backups to Cloudflare R2.
  # Runs pg_dump on BACKUP_SCHEDULE, uploads encrypted backup to R2, prunes old backups.
  backup:
    image: siemens/postgres-backup-s3:18
    depends_on:
      db:
        condition: service_healthy
    environment:
      SCHEDULE: ${BACKUP_SCHEDULE:-@daily}
      BACKUP_KEEP_DAYS: ${BACKUP_KEEP_DAYS:-30}
      S3_REGION: auto
      S3_ENDPOINT: ${BACKUP_S3_ENDPOINT}
      S3_BUCKET: ${BACKUP_S3_BUCKET}
      S3_PREFIX: ${BACKUP_S3_PREFIX:-backups}
      S3_ACCESS_KEY_ID: ${BACKUP_S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${BACKUP_S3_SECRET_ACCESS_KEY}
      PASSPHRASE: ${BACKUP_ENCRYPTION_PASSWORD}
      POSTGRES_HOST: db
      POSTGRES_DATABASE: ${POSTGRES_DB:-openrift}
      POSTGRES_USER: ${POSTGRES_USER:-openrift}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    restart: unless-stopped
