# Dev:  docker compose up db       (just Postgres; run API + Vite natively with bun dev)
# Prod: docker compose up -d       (Postgres + app + web)
services:
  # PostgreSQL database.
  db:
    image: postgres:18-alpine
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "127.0.0.1:${DB_PORT:-5432}:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "10"
    restart: unless-stopped

  # Hono API server (runs migrations on startup, schedules cron jobs).
  api:
    image: ghcr.io/openriftapp/openrift-api:${IMAGE_TAG:-latest}
    user: "${UID:-1000}:${GID:-1000}"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./media:/app/media
    ports:
      - "127.0.0.1:${API_PORT:-3001}:3000"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "10"
    restart: unless-stopped

  # TanStack Start SSR server (internal only — not exposed to host).
  web:
    image: ghcr.io/openriftapp/openrift-web:${IMAGE_TAG:-latest}
    depends_on:
      - api
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
    environment:
      PORT: "3001"
      API_INTERNAL_URL: "http://api:3000"
      # Resolved per-container at startup from .env so the same image can ship
      # to prod and preview. Each deploy sets APP_ENV (production|preview)
      # and SITE_URL in its own .env.
      APP_ENV: "${APP_ENV:-production}"
      SITE_URL: "${SITE_URL}"
      # Sentry DSN shared by the SSR Node process and the browser SDK (the
      # browser receives it inlined into the SSR shell). The api service
      # also reads this via env_file to derive its tunnel forwarding target.
      SENTRY_DSN_SSR: "${SENTRY_DSN_SSR-}"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "10"
    restart: unless-stopped
    stop_grace_period: 15s

  # Nginx reverse proxy + static asset serving (exposed to host).
  proxy:
    image: ghcr.io/openriftapp/openrift-proxy:${IMAGE_TAG:-latest}
    depends_on:
      - web
      - api
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
    volumes:
      - ./media:/srv/static/media:ro
    ports:
      - "127.0.0.1:${WEB_PORT:-8080}:8080"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "10"
    restart: unless-stopped
