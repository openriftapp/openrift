# Refer for explanation to following link:
# https://github.com/evilmartians/lefthook/blob/master/docs/usage.md

commit-msg:
  commands:
    lint-commit-msg:
      run: bunx commitlint --edit

pre-commit:
  parallel: false
  commands:
    oxlint-check:
      glob: "*.{js,ts,cjs,mjs,d.cts,d.mts,jsx,tsx}"
      run: bunx oxlint --deny-warnings '{staged_files}'
    eslint-check:
      glob: "*.{js,ts,jsx,tsx}"
      root: "apps/web/"
      run: bunx eslint --no-warn-ignored '{staged_files}'
    syncpack-lint:
      glob: "**/package.json"
      run: bunx syncpack lint
    oxfmt-fix:
      glob: "*.{js,ts,cjs,mjs,d.cts,d.mts,jsx,tsx,json,jsonc,md}"
      run: bunx oxfmt '{staged_files}' && git update-index --again

pre-push:
  commands:
    typescript-check:
      glob: "*.{ts,tsx}"
      run: bun run --cwd packages/shared typecheck && bun run --cwd apps/web typecheck
    knip-check:
      glob: "*.{js,ts,cjs,mjs,jsx,tsx}"
      run: bun run knip
    lockfile-check:
      glob: "**/package.json"
      run: bun install --frozen-lockfile
    test:
      run: bun run test
    # test-integration:
      # run: bun run test:integration
