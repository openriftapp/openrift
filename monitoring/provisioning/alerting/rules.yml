apiVersion: 1

groups:
  - orgId: 1
    name: OpenRift Alerts
    folder: OpenRift
    interval: 1m
    rules:
      # ── Memory ───────────────────────────────────────────────
      - uid: high-memory
        title: "High memory usage"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: "1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)"
              refId: A
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [0.8]
              refId: C
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "RAM usage above 80% for 5 minutes"
        noDataState: OK
        execErrState: Alerting
        isPaused: false

      - uid: critical-memory
        title: "Critical memory usage"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: "1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)"
              refId: A
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [0.9]
              refId: C
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "RAM usage above 90% for 2 minutes"
        noDataState: OK
        execErrState: Alerting
        isPaused: false

      # ── Disk ─────────────────────────────────────────────────
      - uid: disk-warning
        title: "Disk almost full"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: '1 - (node_filesystem_avail_bytes{mountpoint="/",fstype!="rootfs"} / node_filesystem_size_bytes{mountpoint="/",fstype!="rootfs"})'
              refId: A
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [0.85]
              refId: C
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Disk usage above 85% for 5 minutes"
        noDataState: OK
        execErrState: Alerting
        isPaused: false

      - uid: disk-critical
        title: "Disk critical"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: '1 - (node_filesystem_avail_bytes{mountpoint="/",fstype!="rootfs"} / node_filesystem_size_bytes{mountpoint="/",fstype!="rootfs"})'
              refId: A
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [0.95]
              refId: C
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Disk usage above 95% for 2 minutes"
        noDataState: OK
        execErrState: Alerting
        isPaused: false

      # ── CPU ──────────────────────────────────────────────────
      - uid: high-cpu
        title: "High CPU usage"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              expr: '1 - avg(rate(node_cpu_seconds_total{mode="idle"}[5m]))'
              refId: A
          - refId: B
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [0.85]
              refId: C
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "CPU usage above 85% for 10 minutes"
        noDataState: OK
        execErrState: Alerting
        isPaused: false

      # ── Database ─────────────────────────────────────────────
      - uid: db-connections-high
        title: "Database connections high"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: 'sum(pg_stat_activity_count{datname="openrift"}) / pg_settings_max_connections'
              refId: A
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [0.8]
              refId: C
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Active DB connections above 80% of max_connections"
        noDataState: OK
        execErrState: Alerting
        isPaused: false
