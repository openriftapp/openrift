limit_req_zone $http_x_real_ip zone=api:10m rate=30r/s;

# CSP header value. Streaming SSR injects inline <script> tags for each
# streamed Suspense chunk, so 'unsafe-inline' is required for script-src.
# Nonce-based CSP is impractical with streaming (CSP header is sent before
# chunks are generated). 'unsafe-eval' is required because Zod 4 JIT-compiles
# schemas via `new Function()` for performance.
# Umami analytics (umami.eikowagenknecht.com) needs script-src to load the
# tracker and connect-src to send beacon events.
# Sentry browser SDK uploads events to *.ingest.de.sentry.io (EU region) via
# connect-src; without this the openrift-ssr project never receives client
# errors.
map $uri $csp_header {
    default "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://umami.eikowagenknecht.com; style-src 'self' 'unsafe-inline'; img-src 'self' https: data: blob:; connect-src 'self' https://umami.eikowagenknecht.com https://*.ingest.de.sentry.io; font-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';";
}

# Resolve X-Real-IP at the server level so it's available in all locations.
map $http_x_real_ip $real_ip {
    default $http_x_real_ip;
    ""      $remote_addr;
}

server {
    listen 8080;
    server_name _;

    client_max_body_size 50m;

    # ── Security headers (server-level defaults) ─────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(self)" always;
    add_header Content-Security-Policy $csp_header always;

    # ── Nginx status for monitoring (internal access only) ─────────────────
    location /nginx_status {
        stub_status;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        allow 10.0.0.0/8;
        allow 127.0.0.1;
        deny all;
    }

    # ── API: proxy to Hono (unchanged) ───────────────────────────────────
    location /api/ {
        limit_req zone=api burst=60 nodelay;
        limit_req_status 429;
        proxy_pass http://api:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $real_ip;
        proxy_set_header X-Forwarded-For $http_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    # ── Static: hashed assets (immutable, long cache) ────────────────────
    location /assets/ {
        root /srv/static;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # ── Static: media files (card images, set images — immutable, long cache)
    location /media/ {
        root /srv/static;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # ── Everything else: proxy to TanStack Start SSR server ──────────────
    location / {
        proxy_pass http://web:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $real_ip;
        proxy_set_header X-Forwarded-For $http_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 30s;

        # Cache-Control is set by the SSR app itself (see
        # apps/web/src/lib/page-cache.ts) so the app is the single source of
        # truth for per-route cacheability. Adding a header here would stack
        # with the app's value and defeat Cloudflare edge caching.
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Content-Security-Policy $csp_header always;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 256;
}
